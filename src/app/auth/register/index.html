<div class="container text-center">
  <div class="row">
    <div class="col-md-6 offset-md-3 mt-5">
      <div class="card">
        <h5 class="card-header">Registro</h5>
        <div class="card-body">
          <form id="register-form" class="px-5">
            <div id="msj-error" class="mb-3"></div>
            <div class="mb-3">
              <input type="text" class="form-control" id="username" placeholder="*Email" required>
            </div>
            <div class="mb-3">
              <div class="input-group">
                <input type="password" class="form-control" id="password" placeholder="*Password" required>
                <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                  <i class="bi bi-eye"></i>
                </button>
              </div>
            </div>
            <button type="submit" class="btn btn-primary">Aceptar</button>
          </form>
        </div>
      </div>
      <div class="col-md-12 mt-2">
        <a href="/">Inicio</a> | <a href="/login">Login</a> | <a href="/forget">Recuperar Contraseña</a>
      </div>
    </div>
  </div>
</div>
