<div class="container">
    <div class="row">
        <h1>DASHBOARD</h1>
        <div class="col-md-4">
            <form id="save-form">
                <h2 id="title"></h2>
                <input type="hidden" class="form-control" id="Id">
                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre*</label>
                    <input type="text" class="form-control" id="nombre" required>
                </div>
                <div class="mb-3">
                    <label for="precio" class="form-label">Precio*</label>
                    <input type="text" class="form-control" id="precio" required>
                </div>
                <div class="mb-3">
                    <label for="link" class="form-label">Url Paypal</label>
                    <input type="text" class="form-control" id="link">
                </div>
                <div class="mb-3">
                    <label for="desc" class="form-label">Descripción</label>
                    <textarea class="form-control" rows="2" id="desc"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Guardar</button>
                <button type="button" class="btn btn-danger" id="btnCancel">Cancelar</button>
            </form>
        </div>
        <div class="col-md-8" style="overflow-y: auto; height: 500px;">
            <table class="table">
                <thead class="table-dark">
                    <tr>
                        <th scope="col">Id</th>
                        <th scope="col">Nombre</th>
                        <th scope="col">Precio</th>
                        <th scope="col">Descripción</th>
                        <th scope="col">Acción</th>
                    </tr>
                </thead>
                <tbody id="product-list">
                </tbody>
            </table>
        </div>
    </div>
</div>
